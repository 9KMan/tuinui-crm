version: '3.8'

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: twenty-crm-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=http://localhost:5173
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=crm
      - DB_PASSWORD=crm123
      - DB_DATABASE=crm
      - DB_SYNCHRONIZE=false
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped
    networks:
      - crm-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: twenty-crm-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - crm-network

  db:
    image: postgres:15-alpine
    container_name: twenty-crm-db
    environment:
      - POSTGRES_USER=crm
      - POSTGRES_PASSWORD=crm123
      - POSTGRES_DB=crm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - crm-network

  cache:
    image: redis:7-alpine
    container_name: twenty-crm-cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - crm-network

volumes:
  pgdata:
  redisdata:

networks:
  crm-network:
    driver: bridge
